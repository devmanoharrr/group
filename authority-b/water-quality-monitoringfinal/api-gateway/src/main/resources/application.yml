# API Gateway Configuration

# Server Configuration
server:
  port: 8090

# Application Name
spring:
  application:
    name: api-gateway

  # Spring Cloud Gateway Routes
  cloud:
    gateway:
      # Route definitions
      routes:
        # Route 1: Crowdsourced Data Service
        - id: data-service
          uri: http://localhost:8091
          predicates:
            - Path=/data/**
          filters:
            - RewritePath=/data/(?<segment>.*), /api/data/$\{segment}

        # Route 2: Rewards Service
        - id: rewards-service
          uri: http://localhost:8092
          predicates:
            - Path=/rewards/**
          filters:
            - RewritePath=/rewards/(?<segment>.*), /api/rewards/$\{segment}

      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: false

# Actuator Configuration (Health checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

# Logging Configuration
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.waterquality.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
