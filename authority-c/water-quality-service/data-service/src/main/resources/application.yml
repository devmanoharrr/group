spring:
  application:
    name: data-service
  datasource:
    url: jdbc:sqlite:${wq.data.dir:../data}/observations.db
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 16MB
server:
  port: 8101
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    org.flywaydb: info

wq:
  seed:
    enabled: true
