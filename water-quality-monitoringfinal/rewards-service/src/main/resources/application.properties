# Rewards Service Configuration

# Application Configuration
spring.application.name=rewards-service
server.port=8082

# Data Service Connection
data.service.url=http://localhost:8081

# Logging Configuration
logging.level.root=INFO
logging.level.com.waterquality.rewards=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# CORS Configuration (Allow frontend access)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Actuator (Optional - for monitoring)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
